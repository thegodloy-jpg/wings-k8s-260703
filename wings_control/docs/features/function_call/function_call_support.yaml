feature: function_call
field: tool_call_parser
engines: [vllm, vllm_ascend, sglang]

architectures:

  - name: DeepseekV3ForCausalLM
    config:
      vllm:        {default: deepseek_v3, DeepSeek-V3.1: deepseek_v31, DeepSeek-V3.1-w8a8: deepseek_v31}
      vllm_ascend: {default: deepseek_v3, DeepSeek-V3.1: deepseek_v31, DeepSeek-V3.1-w8a8: deepseek_v31}
      sglang:      {default: deepseek_v3, DeepSeek-V3.1: deepseek_v31, DeepSeek-V3.1-w8a8: deepseek_v31}
    models:
      DeepSeek-R1:                {vllm: deepseek_v3, vllm_ascend: deepseek_v3, sglang: deepseek_v3}
      DeepSeek-R1-0528:           {vllm: deepseek_v3, vllm_ascend: deepseek_v3, sglang: deepseek_v3}
      DeepSeek-V3:                {vllm: deepseek_v3, vllm_ascend: deepseek_v3, sglang: deepseek_v3}
      DeepSeek-V3-0324:           {vllm: deepseek_v3, vllm_ascend: deepseek_v3, sglang: deepseek_v3}
      DeepSeek-V3.1:              {vllm: deepseek_v31, vllm_ascend: deepseek_v31, sglang: deepseek_v31}
      DeepSeek-R1-w8a8:           {vllm: deepseek_v3, vllm_ascend: deepseek_v3, sglang: deepseek_v3}
      DeepSeek-R1-0528-w8a8:      {vllm: deepseek_v3, vllm_ascend: deepseek_v3, sglang: deepseek_v3}
      DeepSeek-V3-w8a8:           {vllm: deepseek_v3, vllm_ascend: deepseek_v3, sglang: deepseek_v3}
      DeepSeek-V3-0324-w8a8:      {vllm: deepseek_v3, vllm_ascend: deepseek_v3, sglang: deepseek_v3}
      DeepSeek-V3.1-w8a8:         {vllm: deepseek_v31, vllm_ascend: deepseek_v31, sglang: deepseek_v31}
      DeepSeek-Coder-V2-Instruct: {vllm: null, vllm_ascend: null, sglang: null}

  - name: DeepseekV4ForCausalLM
    config:
      vllm:        {default: deepseek_v4}
      vllm_ascend: {default: deepseek_v4}
      sglang:      {default: deepseek_v4}
    models: {}

  - name: DeepseekV32ForCausalLM
    config:
      vllm:        {default: deepseek_v32}
      vllm_ascend: {default: deepseek_v32}
      sglang:      {default: deepseek_v32}
    models: {}

  - name: Qwen2ForCausalLM
    config:
      vllm:        {default: hermes}
      vllm_ascend: {default: hermes}
      sglang:      {default: hermes}
    models: {}

  - name: Qwen3ForCausalLM
    config:
      vllm:        {default: hermes}
      vllm_ascend: {default: hermes}
      sglang:      {default: hermes}
    models: {}

  - name: Qwen3MoeForCausalLM
    config:
      vllm:        {default: hermes}
      vllm_ascend: {default: hermes}
      sglang:      {default: hermes}
    models: {}

  - name: Qwen3NextForCausalLM
    config:
      vllm:        {default: hermes}
      vllm_ascend: {default: hermes}
      sglang:      {default: hermes}
    models: {}

  - name: Qwen3_5ForConditionalGeneration
    config:
      vllm:        {default: qwen3_coder}
      vllm_ascend: {default: qwen3_coder}
      sglang:      {default: qwen3_coder}
    models: {}

  - name: Qwen3_5MoeForConditionalGeneration
    config:
      vllm:        {default: qwen3_coder, Qwen-AgentWorld-35B-A3B: null}
      vllm_ascend: {default: qwen3_coder, Qwen-AgentWorld-35B-A3B: null}
      sglang:      {default: qwen3_coder, Qwen-AgentWorld-35B-A3B: null}
    models: {}

  - name: Glm4ForCausalLM
    config:
      vllm:        {default: hermes}
      vllm_ascend: {default: hermes}
      sglang:      {default: hermes}
    models: {}

  - name: Glm4MoeForCausalLM
    config:
      vllm:        {default: glm47}
      vllm_ascend: {default: glm47}
      sglang:      {default: glm47}
    models: {}

  - name: GlmMoeDsaForCausalLM
    config:
      vllm:        {default: glm47}
      vllm_ascend: {default: glm47}
      sglang:      {default: glm47}
    models: {}

  - name: MiniMaxM2ForCausalLM
    config:
      vllm:        {default: minimax_m2}
      vllm_ascend: {default: minimax_m2}
      sglang:      {default: minimax_m2}
    models: {}

  - name: LlamaForCausalLM
    config:
      vllm:        {default: llama3_json}
      vllm_ascend: {default: llama3_json}
      sglang:      {default: llama3_json}
    models: {}
